<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/formulario.css">
    <title>Kevin Diaz - Parcial 2</title>
</head>
<body>
    <div id="container">
        <h1>Bienvenidos</h1>
        <form id="formulario">
            <label for="email">Usuario:</label>
            <input type="email" id="email" name="email" required placeholder="Ingresar Email">
            <p id="emailError" class="error-message"></p>
            <label for="lat">Contraseña:</label>
            <input type="password" id="lat" name="lat" required placeholder="Inresar Latitud" title="Ingresa una latitud válida (por ejemplo: -09.1218)">
            <p id="latError" class="error-message"></p> 

            <button type="submit">Ingresar</button>
            <p id="ingresar"></p> 
        </form>
    </div>
</body>

<script src="js/script.js"></script>
</html>
